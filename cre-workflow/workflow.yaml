# ==========================================================================
# SENTINEL WORKFLOW SETTINGS FILE
# ==========================================================================
# Workflow-specific settings for CRE CLI targets.
# Each target defines user-workflow and workflow-artifacts groups.
# ==========================================================================

# ==========================================================================
# STAGING TARGET (Development & Testing)
# ==========================================================================
staging-settings:
  user-workflow:
    workflow-name: "sentinel-security-scanner-staging"
    # ✅ PHASE 5: Cron trigger for automated scanning (every 5 minutes)
    triggers:
      cron:
        - schedule: "*/5 * * * *"
          timezone: "UTC"
  workflow-artifacts:
    workflow-path: "./src/main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../secrets.yaml"

# ==========================================================================
# PRODUCTION TARGET
# ==========================================================================
production-settings:
  user-workflow:
    workflow-name: "sentinel-security-scanner-production"
    # ✅ PHASE 5: Cron trigger for automated scanning (every 4 hours)
    triggers:
      cron:
        - schedule: "0 */4 * * *"
          timezone: "UTC"
        # Additional trigger: Daily comprehensive scan
        - schedule: "0 0 * * *"
          timezone: "UTC"
  workflow-artifacts:
    workflow-path: "./src/main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"

# ==========================================================================
# HACKATHON DEMO TARGET (Sepolia Testnet)
# ==========================================================================
hackathon-settings:
  user-workflow:
    workflow-name: "sentinel-hackathon-demo"
    # ✅ PHASE 5: Cron trigger for demo (every 5 minutes)
    triggers:
      cron:
        - schedule: "*/5 * * * *"
          timezone: "UTC"
  workflow-artifacts:
    workflow-path: "./src/main.ts"
    config-path: "./config.hackathon.json"
    secrets-path: "../secrets.yaml"
