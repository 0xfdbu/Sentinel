<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0a0a0a"/>
  
  <!-- Outer ring (Sentinel watch) -->
  <circle cx="16" cy="16" r="14" stroke="#1e3a5f" stroke-width="1" fill="none"/>
  
  <!-- Middle ring -->
  <circle cx="16" cy="16" r="11" stroke="#375bd2" stroke-width="1.5" fill="none"/>
  
  <!-- Inner shield shape -->
  <path d="M16 6 L24 10 L24 16 Q24 22 16 26 Q8 22 8 16 L8 10 Z" 
        fill="#375bd2" 
        stroke="#4f7cf7" 
        stroke-width="1"/>
  
  <!-- Eye/Sentinel center -->
  <ellipse cx="16" cy="16" rx="4" ry="3" fill="#0a0a0a"/>
  <circle cx="16" cy="16" r="1.5" fill="#60a5fa"/>
  
  <!-- Radar waves (top right) -->
  <path d="M22 8 Q24 8 24 10" stroke="#60a5fa" stroke-width="1" fill="none" opacity="0.8"/>
  <path d="M23 6 Q26 6 26 9" stroke="#60a5fa" stroke-width="1" fill="none" opacity="0.5"/>
</svg>